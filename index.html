<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>らくがきでんわゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#EAF4FB;
    --ink:#27324A;
    --orange:#FF8A3D; --orange-dark:#E06B1F;
    --teal:#2BB7A4; --teal-dark:#1C8C7D;
    --pink:#FF6B9D; --pink-dark:#D94C80;
    --purple:#8B6FE8; --purple-dark:#6E4FD0;
    --yellow:#FFD23F;
    --card:#FFFFFF;
    --line:#D7E6F0;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh;
    font-family:'Zen Maru Gothic', sans-serif;
    background:
      radial-gradient(circle at 12% 8%, #DDEEFB 0%, transparent 40%),
      radial-gradient(circle at 88% 92%, #FDEFE0 0%, transparent 45%),
      var(--bg);
    color:var(--ink);
  }
  .screen{ max-width:720px; margin:0 auto; padding:24px 16px 60px; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  .logo{ font-family:'Mochiy Pop One', sans-serif; font-size:32px; text-align:center; line-height:1.35; color:var(--orange-dark); margin-top:10px; transform:rotate(-2deg); }
  .tagline{ text-align:center; opacity:.75; margin:10px 0 30px; font-size:15px; max-width:420px; }
  .choice-row{ display:flex; gap:16px; flex-wrap:wrap; justify-content:center; width:100%; }
  .big-btn{ font-family:'Zen Maru Gothic',sans-serif; font-size:18px; font-weight:700; border:none; border-radius:22px; padding:20px 22px; color:#fff; cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,.15); transition:transform .08s ease, box-shadow .08s ease; line-height:1.5; min-width:150px; }
  .big-btn:active{ transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.15); }
  .big-btn:disabled{ opacity:.4; cursor:not-allowed; box-shadow:0 5px 0 rgba(0,0,0,.08); }
  .big-btn:disabled:active{ transform:none; }
  .crayon-orange{ background:var(--orange); } .crayon-orange:active{ background:var(--orange-dark); }
  .crayon-teal{ background:var(--teal); } .crayon-teal:active{ background:var(--teal-dark); }
  .crayon-pink{ background:var(--pink); } .crayon-pink:active{ background:var(--pink-dark); }
  .crayon-purple{ background:var(--purple); } .crayon-purple:active{ background:var(--purple-dark); }
  .sub{ font-size:12px; font-weight:400; opacity:.9; margin-top:4px; }
  .ticket{ background:#fff; border:3px dashed var(--orange); border-radius:18px; padding:16px 30px; text-align:center; transform:rotate(-1.5deg); box-shadow:0 4px 0 rgba(0,0,0,.07); margin-bottom:6px; }
  .ticket-label{ font-size:13px; opacity:.7; }
  .ticket-code{ font-family:'Mochiy Pop One',sans-serif; font-size:46px; letter-spacing:8px; color:var(--orange-dark); }
  .hint{ opacity:.65; font-size:13px; margin:6px 0 22px; text-align:center; }
  .player-list{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:26px; width:100%; min-height:40px; }
  .chip{ background:#fff; border-radius:999px; padding:8px 16px 8px 8px; display:flex; align-items:center; gap:8px; box-shadow:0 2px 0 rgba(0,0,0,.07); font-size:14px; font-weight:700; }
  .avatar{ width:26px;height:26px;border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:12px; flex-shrink:0; }
  .waiting-msg{ opacity:.65; }
  .card{ background:var(--card); border-radius:20px; padding:18px; width:100%; box-shadow:0 4px 0 rgba(0,0,0,.05); margin-bottom:14px; }
  .card p{ margin:0 0 10px; }
  .form-label{ font-weight:700; font-size:14px; }
  input[type=text], textarea{ width:100%; font-family:'Zen Maru Gothic',sans-serif; font-size:18px; padding:14px; border-radius:14px; border:2px solid var(--line); resize:none; margin-top:6px; }
  input[type=text]:focus, textarea:focus{ outline:none; border-color:var(--orange); }
  .round-bar{ display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:12px; font-weight:700; font-size:14px; }
  .timer-pill{ background:var(--pink); color:#fff; padding:6px 14px; border-radius:999px; font-family:'Mochiy Pop One',sans-serif; font-size:13px; }
  .prompt-box{ background:#FFF7E8; border:2px dashed var(--yellow); border-radius:16px; padding:16px; text-align:center; font-size:19px; font-weight:700; margin-bottom:14px; width:100%; }
  .canvas-wrap, .preview-canvas{ width:100%; aspect-ratio:4/3; background:#fff; border-radius:16px; border:2px solid var(--line); overflow:hidden; margin-bottom:12px; }
  .canvas-wrap canvas, .preview-canvas canvas{ width:100%; height:100%; display:block; touch-action:none; }
  .canvas-stack{ position:relative; width:100%; aspect-ratio:4/3; background:#fff; border-radius:16px; border:2px solid var(--line); overflow:hidden; margin-bottom:12px; }
  .canvas-stack canvas{ position:absolute; top:0; left:0; width:100%; height:100%; display:block; touch-action:none; }
  .mode-row{ display:flex; gap:10px; flex-wrap:wrap; }
  .mode-btn{ flex:1; min-width:140px; font-family:'Zen Maru Gothic',sans-serif; background:#fff; border:2px solid var(--line); border-radius:16px; padding:12px 14px; cursor:pointer; text-align:left; display:flex; flex-direction:column; gap:4px; }
  .mode-btn.active{ border-color:var(--teal); background:#E7F8F5; }
  .mode-title{ font-weight:900; font-size:15px; color:var(--ink); }
  .mode-desc{ font-size:12px; opacity:.7; line-height:1.5; }
  .toolbar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; width:100%; }
  .swatch{ width:32px;height:32px;border-radius:50%; border:3px solid #fff; outline:2px solid var(--line); cursor:pointer; padding:0; }
  .swatch.active{ outline:3px solid var(--ink); }
  .size-btn{ width:34px;height:34px;border-radius:50%; background:#fff; border:2px solid var(--line); cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex-shrink:0; }
  .size-btn.active{ border-color:var(--orange); background:#FFF1E5; color:var(--orange-dark); }
  .pentype-row{ display:flex; gap:8px; flex-wrap:wrap; width:100%; margin-bottom:10px; }
  .pentype-btn{ font-family:'Zen Maru Gothic',sans-serif; background:#fff; border:2px solid var(--line); border-radius:14px; padding:8px 14px; cursor:pointer; font-size:13px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:6px; }
  .pentype-btn.active{ border-color:var(--teal); background:#E7F8F5; color:var(--teal-dark); }
  .pentype-icon{ font-size:15px; }
  .toolbar-label{ font-size:12px; opacity:.6; font-weight:700; width:100%; margin:2px 0 -2px; }
  .tool-action{ margin-left:auto; display:flex; gap:8px; }
  .small-btn{ font-family:'Zen Maru Gothic',sans-serif; background:#fff; border:2px solid var(--line); border-radius:14px; padding:10px 16px; cursor:pointer; font-size:13px; font-weight:700; color:var(--ink); }
  .small-btn:active{ background:var(--line); }
  .spinner{ width:34px;height:34px;border:5px solid var(--line); border-top-color:var(--orange); border-radius:50%; animation:spin 1s linear infinite; margin-top:18px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .book-grid{ display:flex; flex-wrap:wrap; gap:14px; justify-content:center; margin:20px 0; width:100%; }
  .book-btn{ min-width:150px; }
  .line-screen{ width:100%; display:flex; flex-direction:column; align-items:center; }
  .line-header{ display:flex; align-items:center; gap:12px; width:100%; margin-bottom:14px; }
  .line-header .line-title{ font-family:'Mochiy Pop One',sans-serif; font-size:16px; color:var(--orange-dark); flex:1; }
  .line-talk-wrap{
    width:100%; border-radius:20px; padding:22px 14px; box-shadow:0 4px 0 rgba(0,0,0,.05);
    display:flex; flex-direction:column; gap:18px;
    background-color:#8FC7A6;
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,.06) 0 2px, transparent 2px 26px),
      repeating-linear-gradient(45deg, rgba(255,255,255,.05) 0 2px, transparent 2px 26px);
  }
  .line-msg{ display:flex; align-items:flex-start; gap:8px; opacity:0; transform:translateY(14px); transition:opacity .35s ease, transform .35s ease; }
  .line-msg.show{ opacity:1; transform:translateY(0); }
  .typing-bubble{ display:flex; align-items:center; gap:4px; padding:14px 16px; }
  .typing-bubble span{ width:7px; height:7px; border-radius:50%; background:#c7c7c7; animation:line-typing-blink 1.2s infinite ease-in-out; }
  .typing-bubble span:nth-child(2){ animation-delay:.2s; }
  .typing-bubble span:nth-child(3){ animation-delay:.4s; }
  @keyframes line-typing-blink{ 0%,80%,100%{ opacity:.3; transform:translateY(0); } 40%{ opacity:1; transform:translateY(-3px); } }
  .line-avatar{ width:36px;height:36px;border-radius:50%; display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px;flex-shrink:0; box-shadow:0 2px 0 rgba(0,0,0,.15); border:2px solid rgba(255,255,255,.6); }
  .line-msg-col{ display:flex; flex-direction:column; gap:4px; max-width:74%; }
  .line-name{ font-size:11px; font-weight:700; color:#fff; opacity:.85; margin-left:3px; text-shadow:0 1px 1px rgba(0,0,0,.15); }
  .line-bubble{ position:relative; background:#fff; border-radius:4px 16px 16px 16px; padding:12px 14px; font-size:16px; font-weight:700; line-height:1.5; box-shadow:0 2px 0 rgba(0,0,0,.08); word-break:break-word; }
  .line-bubble:before{ content:''; position:absolute; top:0; left:-7px; width:0; height:0; border-style:solid; border-width:0 8px 10px 0; border-color:transparent #fff transparent transparent; }
  .line-bubble.line-empty{ opacity:.6; font-weight:400; font-style:italic; font-size:13px; }
  .line-bubble.draw{ padding:6px; border-radius:4px 16px 16px 16px; }
  .line-canvas{ width:190px; max-width:60vw; aspect-ratio:4/3; border-radius:14px; overflow:hidden; background:#fff; }
  .line-canvas canvas{ width:100%; height:100%; display:block; }
  .bubble{ background:#FFF7E8; border:2px dashed var(--yellow); border-radius:16px; padding:22px; text-align:center; font-size:20px; font-weight:700; width:100%; margin-bottom:10px; }
  .author-tag{ text-align:center; opacity:.65; font-size:13px; margin-bottom:14px; }
  .qrbox{ background:#fff; border-radius:18px; padding:16px; display:flex; flex-direction:column; align-items:center; gap:8px; box-shadow:0 4px 0 rgba(0,0,0,.05); margin-bottom:18px; }
  .qrbox img, .qrbox canvas, .qrbox table{ display:block; }
  .qrbox .qrcap{ font-size:12px; opacity:.65; }
  .linkrow{ display:flex; gap:8px; align-items:center; }
  .firebase-setup{ background:#fff; border:3px dashed var(--orange); border-radius:18px; padding:18px; width:100%; margin-bottom:14px; }
  .firebase-setup h3{ font-size:15px; margin:0 0 10px; color:var(--orange-dark); }
  .firebase-setup input[type=text]{ font-family:monospace; font-size:13px; }
  .error-box{ background:#FFE9E9; border:2px solid #E14B4B; border-radius:12px; padding:12px 14px; margin:10px 0; color:#B23B3B; font-size:13px; line-height:1.6; }
  .help-steps{ font-size:13px; line-height:1.85; opacity:.85; margin:0; }
  .help-steps strong{ color:var(--orange-dark); }
  .help-steps a{ color:var(--teal-dark); }
  .connecting{ text-align:center; padding:30px; opacity:.7; }
  .global-home-btn{ position:fixed; top:14px; left:14px; z-index:999; font-family:'Zen Maru Gothic',sans-serif; background:#fff; border:2px solid var(--line); border-radius:999px; padding:10px 16px; font-size:13px; font-weight:700; color:var(--ink); cursor:pointer; box-shadow:0 3px 0 rgba(0,0,0,.08); display:none; }
  .global-home-btn:active{ background:var(--line); }
</style>
</head>
<body>
<button type="button" id="globalHomeBtn" class="global-home-btn">🏠 さいしょへもどる</button>
<div id="app"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, remove, onValue }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

(function(){
  "use strict";
  var appEl = document.getElementById('app');
  var ROUND_SEC = 75;
  var MIN_PLAYERS = 3;
  var CHIMERA_TURN_OPTIONS = [3,5,10];
  var chimeraTurnSec = 5;
  var MIN_PLAYERS_CHIMERA = 3;
  var LOBBY_TIMEOUT_SEC = 300;
  var PEN_COLORS = [
    {name:'くろ', hex:'#2B2B2B'},
    {name:'ちゃいろ', hex:'#8B5A2B'},
    {name:'あか', hex:'#E14B4B'},
    {name:'オレンジ', hex:'#FF8A3D'},
    {name:'きいろ', hex:'#F2B705'},
    {name:'きみどり', hex:'#8DC63F'},
    {name:'みどり', hex:'#3FA66B'},
    {name:'みずいろ', hex:'#5BC8E8'},
    {name:'あお', hex:'#3B82C4'},
    {name:'こんいろ', hex:'#2E4A87'},
    {name:'むらさき', hex:'#8B6FE8'},
    {name:'ピンク', hex:'#E865A0'},
    {name:'しろ', hex:'#FFFFFF'}
  ];
  var PEN_SIZES = [
    {label:'XS', w:0.0035},
    {label:'S', w:0.008},
    {label:'M', w:0.015},
    {label:'L', w:0.026},
    {label:'XL', w:0.042}
  ];
  var DEFAULT_SIZE_INDEX = 2;
  var PEN_TYPES = [
    {id:'crayon', label:'クレヨン', icon:'🖍️', alpha:1, cap:'round', composite:'source-over', widthMul:1},
    {id:'marker', label:'マーカー', icon:'🖊️', alpha:1, cap:'square', composite:'source-over', widthMul:1.15},
    {id:'pencil', label:'えんぴつ', icon:'✏️', alpha:0.55, cap:'round', composite:'source-over', widthMul:0.45},
    {id:'highlight', label:'けいこうペン', icon:'🖌️', alpha:0.35, cap:'square', composite:'multiply', widthMul:2.2},
    {id:'eraser', label:'けしごむ', icon:'🧽', alpha:1, cap:'round', composite:'destination-out', widthMul:2.6}
  ];
  var BOOK_COLORS = ['orange','teal','pink','purple'];
  var TOPIC_EXAMPLES = [
    'うちゅうじんとおどるネコ','おならで空をとぶブタ','パンツいちまいのサメ','ラーメンをたべるロボット',
    'めがねをかけたかいじゅう','おふろに入るきょうりゅう','スマホをもったカエル','ケーキになったおやま',
    'さかだちするぞう','マラソンするカタツムリ','うたうだいこん','スーツをきたペンギン',
    'こしをふるタコ','てんぷらになったくつ','おひげがはえたたまご','マントをきたハムスター',
    'ロケットにのるネコ','にんじゃになったパンダ','スケートするおすし','パーティーするおばけ',
    'えんそくにいくおにぎり','たたかうキャベツ','ダンスするうんちマーク','うちゅうをとぶくじら',
    'ぼうしをかぶったカバ','おどろくコアラ','からあげになったチキンきぐるみ','たいそうするたまねぎ',
    'かいだんをのぼるカタツムリ','スカイダイビングするネズミ'
  ];
  function pickFunnyExamples(n){
    var pool = TOPIC_EXAMPLES.slice();
    var picked = [];
    for(var i=0;i<n && pool.length>0;i++){
      var idx = Math.floor(Math.random()*pool.length);
      picked.push(pool.splice(idx,1)[0]);
    }
    return picked;
  }

  var db = null;
  var pendingJoinCode = null;

  var phase = 'home';
  var myId=null, myName=null, roomCode=null, isHost=false;
  var gameMode = 'phone';
  var chimeraTopic = '';
  var chimeraTopicSetterId = null;
  var chimeraLockedStrokes = [];
  var playerOrder=[], totalRounds=0, currentRoundSeen=-1, mySubmittedRound=-1, myBookIndex=-1;
  var roundDeadline=0, timerInterval=null;
  var strokes=[];
  var selectedColor = PEN_COLORS[0].hex;
  var selectedSize = PEN_SIZES[DEFAULT_SIZE_INDEX].w;
  var selectedPenType = PEN_TYPES[0].id;
  var currentInputEl=null;
  var SESSION_KEY = 'gartic_session';

  var revealFirstsCache = null;
  var bookRenderToken = 0; // 「お話」画面のトーク風アニメーションを中断/無効化するためのトークン
  var lastRoom=null, lastPlayers=[];
  var roomUnsub=null, playersUnsub=null, waitingSubmitsUnsub=null;
  var advancingRound=-1;
  var hostTimeUpInterval=null;
  var lobbyDeadline=0, lobbyCountdownInterval=null, lobbyHostCheckInterval=null;

  // ---------- firebase path helpers ----------
  function pRoom(code){ return 'gartic/rooms/'+code; }
  function pPlayers(code){ return 'gartic/rooms/'+code+'/players'; }
  function pPlayer(code,id){ return 'gartic/rooms/'+code+'/players/'+id; }
  function pEntry(code,book,round){ return 'gartic/rooms/'+code+'/entries/'+book+'/'+round; }
  function pSubmits(code,round){ return 'gartic/rooms/'+code+'/submits/'+round; }
  function pSubmit(code,round,pid){ return 'gartic/rooms/'+code+'/submits/'+round+'/'+pid; }
  function pChimeraStrokes(code){ return 'gartic/rooms/'+code+'/chimeraStrokes'; }

  async function dbGet(path){
    try{
      var snap = await get(ref(db, path));
      return snap.exists() ? snap.val() : null;
    }catch(e){ console.error('get fail', path, e); return null; }
  }
  async function dbSet(path, val){
    try{ await set(ref(db, path), val); return true; }
    catch(e){ console.error('set fail', path, e); return false; }
  }
  async function dbUpdate(path, val){
    try{ await update(ref(db, path), val); return true; }
    catch(e){ console.error('update fail', path, e); return false; }
  }
  function dbWatch(path, cb){
    var r = ref(db, path);
    return onValue(r, function(snap){ cb(snap.exists() ? snap.val() : null); }, function(err){ console.error('watch err', path, err); });
  }
  function detachListeners(){
    if(roomUnsub){ roomUnsub(); roomUnsub=null; }
    if(playersUnsub){ playersUnsub(); playersUnsub=null; }
    if(waitingSubmitsUnsub){ waitingSubmitsUnsub(); waitingSubmitsUnsub=null; }
    if(hostTimeUpInterval){ clearInterval(hostTimeUpInterval); hostTimeUpInterval=null; }
    if(lobbyHostCheckInterval){ clearInterval(lobbyHostCheckInterval); lobbyHostCheckInterval=null; }
    stopLobbyCountdown();
  }

  // ---------- utils ----------
  function esc(s){
    return String(s==null ? '' : s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }
  function genId(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
  function genRoomCode(){ return String(Math.floor(1000 + Math.random()*9000)); }
  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1; i>0; i--){
      var j = Math.floor(Math.random()*(i+1));
      var t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }
  function genShareLink(code){
    try{
      var base = location.href.split('#')[0].split('?')[0];
      var apiKey = localStorage.getItem('gartic_fb_apikey') || '';
      var dbUrl = localStorage.getItem('gartic_fb_dburl') || '';
      return base + '?room=' + code + '&ak=' + encodeURIComponent(apiKey) + '&du=' + encodeURIComponent(dbUrl);
    }catch(e){ return null; }
  }
  function saveSession(){
    try{ localStorage.setItem(SESSION_KEY, JSON.stringify({ room:roomCode, id:myId, name:myName })); }catch(e){}
  }
  function loadSession(){
    try{
      var raw = localStorage.getItem(SESSION_KEY);
      if(!raw) return null;
      var sess = JSON.parse(raw);
      if(!sess || !sess.room || !sess.id || !sess.name) return null;
      return sess;
    }catch(e){ return null; }
  }
  function clearSession(){
    try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
  }

  // ---------- canvas helpers ----------
  function prepareCanvas(canvas){
    var rect = canvas.getBoundingClientRect();
    canvas.width = Math.max(1, Math.round(rect.width));
    canvas.height = Math.max(1, Math.round(rect.height));
  }
  function getPenTypeDef(id){
    for(var i=0;i<PEN_TYPES.length;i++){ if(PEN_TYPES[i].id===id) return PEN_TYPES[i]; }
    return PEN_TYPES[0];
  }
  function paintStrokes(ctx, canvas, strokesArr){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(!Array.isArray(strokesArr)) return;
    strokesArr.forEach(function(s){
      if(!s || !s.points || s.points.length===0) return;
      var pt = getPenTypeDef(s.penType);
      var lw = Math.max(2, s.width * (pt.widthMul||1) * Math.min(canvas.width, canvas.height));
      ctx.save();
      ctx.globalAlpha = (pt.alpha!=null ? pt.alpha : 1);
      ctx.globalCompositeOperation = pt.composite || 'source-over';
      if(s.points.length===1){
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(s.points[0].x*canvas.width, s.points[0].y*canvas.height, lw/2, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        return;
      }
      ctx.strokeStyle = s.color; ctx.lineWidth = lw; ctx.lineCap = pt.cap || 'round'; ctx.lineJoin='round';
      ctx.beginPath();
      ctx.moveTo(s.points[0].x*canvas.width, s.points[0].y*canvas.height);
      for(var i=1;i<s.points.length;i++){ ctx.lineTo(s.points[i].x*canvas.width, s.points[i].y*canvas.height); }
      ctx.stroke();
      ctx.restore();
    });
  }
  function buildDrawToolbars(pentypeToolbar, colorToolbar, sizeToolbar){

  function setupDrawing(canvas){
    var ctx = canvas.getContext('2d');
    var drawingNow=false, current=null;
    function getPos(e){
      var rect = canvas.getBoundingClientRect();
      var cx = (e.touches && e.touches.length) ? e.touches[0].clientX : e.clientX;
      var cy = (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY;
      return { x:(cx-rect.left)/rect.width, y:(cy-rect.top)/rect.height };
    }
    function start(e){
      e.preventDefault(); drawingNow=true;
      var pos=getPos(e);
      current={ color:selectedColor, width:selectedSize, penType:selectedPenType, points:[pos] };
      strokes.push(current);
      paintStrokes(ctx, canvas, strokes);
    }
    function move(e){
      if(!drawingNow) return;
      e.preventDefault();
      current.points.push(getPos(e));
      paintStrokes(ctx, canvas, strokes);
    }
    function end(){ drawingNow=false; current=null; }
    canvas.style.touchAction='none';
    canvas.addEventListener('pointerdown', start);
    canvas.addEventListener('pointermove', move);
    window.addEventListener('pointerup', end);
  }

        '<div class="book-grid">';
    for(var b=0;b<totalRounds;b++){
      var owner = firsts[b] ? firsts[b].authorName : ('チーム' + (b+1));
      html += '<button class="big-btn crayon-' + BOOK_COLORS[b % BOOK_COLORS.length] + ' book-btn" data-book="' + b + '">' + esc(owner) + 'さんの<br>お話</button>';
    }

    document.querySelectorAll('.book-btn').forEach(function(btn){
      btn.onclick = function(){ viewBook(parseInt(btn.getAttribute('data-book'), 10)); };
    });
    document.getElementById('btnHome').onclick = resetToHome;
  }

  var AVATAR_COLORS = ['#FF8A3D','#2BB7A4','#FF6B9D','#8B6FE8','#F2B705','#3B82C4','#8DC63F','#E865A0'];
  function colorForName(name){
    var s = String(name==null ? '?' : name);
    var hash = 0;
    for(var i=0;i<s.length;i++){ hash = (hash*31 + s.charCodeAt(i)) | 0; }
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  }

  function sleep(ms){ return new Promise(function(resolve){ setTimeout(resolve, ms); }); }

  function scrollChatToBottom(){
    try{ window.scrollTo({ top: document.body.scrollHeight, behavior:'smooth' }); }catch(e){}
  }

  async function viewBook(b){
    var myToken = ++bookRenderToken; // 前の描画アニメーションが残っていれば無効化。この呼び出し専用のトークンとして確定させる
    var proms = [];
    for(var r=0;r<totalRounds;r++){ proms.push(dbGet(pEntry(roomCode, b, r))); }
    var entries = await Promise.all(proms);
    if(bookRenderToken !== myToken) return; // データ取得中に別の本が選ばれた/画面が切り替わった場合は描画しない
    renderBookTalk(entries, myToken);
  }

  function appendLineMessage(wrap, e, idx){
    var authorName = e ? e.authorName : '';
    var initial = esc(authorName ? authorName.charAt(0) : '?');
    var color = colorForName(authorName);
    var nameHtml = authorName ? '<div class="line-name">' + esc(authorName) + '</div>' : '';
    var bubbleHtml;
    if(!e){
      bubbleHtml = '<div class="line-bubble line-empty">(だれもこたえられなかったみたい)</div>';
    } else if(e.type==='write'){
      bubbleHtml = '<div class="line-bubble">「' + esc(e.content) + '」</div>';
    } else {
      bubbleHtml = '<div class="line-bubble draw"><div class="line-canvas"><canvas id="lineCanvas' + idx + '"></canvas></div></div>';
    }
    var el = document.createElement('div');
    el.className = 'line-msg';
    el.innerHTML =
      '<div class="line-avatar" style="background:' + color + '">' + initial + '</div>' +
      '<div class="line-msg-col">' + nameHtml + bubbleHtml + '</div>';
    wrap.appendChild(el);
    requestAnimationFrame(function(){ el.classList.add('show'); });
    // 絵の描画に失敗しても他のコマの表示やボタン動作に影響しないよう保護する
    if(e && e.type==='draw'){
      try{
        var c = document.getElementById('lineCanvas' + idx);
        if(c){ prepareCanvas(c); paintStrokes(c.getContext('2d'), c, e.content); }
      }catch(err){ console.error('コマの絵の描画に失敗しました', err); }
    }
    return el;
  }

  function appendTypingIndicator(wrap, e){
    var authorName = e ? e.authorName : '';
    var initial = esc(authorName ? authorName.charAt(0) : '?');
    var color = colorForName(authorName);
    var el = document.createElement('div');
    el.className = 'line-msg';
    el.innerHTML =
      '<div class="line-avatar" style="background:' + color + '">' + initial + '</div>' +
      '<div class="line-msg-col"><div class="line-bubble typing-bubble"><span></span><span></span><span></span></div></div>';
    wrap.appendChild(el);
    requestAnimationFrame(function(){ el.classList.add('show'); });
    return el;
  }

  async function renderBookTalk(entries, myToken){
    var topicTitle = (entries[0] && entries[0].type==='write') ? entries[0].content : (entries[0] ? entries[0].authorName + 'さんのお話' : 'お話');

    appEl.innerHTML =
      '<div class="screen line-screen">' +
        '<div class="line-header">' +
          '<button id="backBtn" class="small-btn">← いちらんにもどる</button>' +
          '<span class="line-title">「' + esc(topicTitle) + '」</span>' +
        '</div>' +
        '<div class="line-talk-wrap" id="lineTalkWrap"></div>' +
      '</div>';
    // 描画やアニメーションで何が起きても「もどる」ボタンは必ず使えるように、先に割り当てる
    document.getElementById('backBtn').onclick = function(){ backToRevealList(); };

    var wrap = document.getElementById('lineTalkWrap');

    for(var idx=0; idx<entries.length; idx++){
      if(bookRenderToken !== myToken) return; // 途中で「もどる」等が押されたら中断
      var e = entries[idx];

      if(idx>0){
        var typingEl = appendTypingIndicator(wrap, e);
        scrollChatToBottom();
        await sleep(600);
        if(bookRenderToken !== myToken) return;
        typingEl.remove();
      }

      appendLineMessage(wrap, e, idx);
      scrollChatToBottom();
      await sleep(200);
    }
  }

  function resetToHome(){
    stopCountdown();
    stopLobbyCountdown();
    detachListeners();
    clearSession();
    bookRenderToken++; // トーク風アニメーションが動いていれば中断させる
    roomCode=null; isHost=false; phase='home';
    gameMode='phone'; chimeraTopic=''; chimeraTopicSetterId=null; chimeraLockedStrokes=[]; lobbyDeadline=0;
    renderHome();
  }

  // ---------- reconnect ----------
  function renderReconnecting(){
    appEl.innerHTML =
      '<div class="screen wait">' +
        '<div class="logo" style="font-size:22px;">さいせつぞくちゅう…</div>' +
        '<p class="hint">まえのゲームにもどっています</p>' +
        '<div class="spinner"></div>' +
      '</div>';
  }

  async function tryReconnect(){
    var sess = loadSession();
    if(!sess) return false;
    renderReconnecting();
    var room = await dbGet(pRoom(sess.room));
    if(!room){ clearSession(); return false; }
    var player = await dbGet(pPlayer(sess.room, sess.id));
    if(!player){
      if(room.started){ clearSession(); return false; }
      var ok = await dbSet(pPlayer(sess.room, sess.id), { id:sess.id, name:sess.name, joinedAt: Date.now() });
      if(!ok){ clearSession(); return false; }
    }
    myId = sess.id; myName = sess.name; roomCode = sess.room; isHost = (room.hostId === myId);
    lastRoom = room;
    gameMode = room.mode || 'phone';
    chimeraTopic = room.topic || '';
    chimeraTopicSetterId = room.topicSetterId || null;
    lobbyDeadline = room.lobbyDeadline || 0;
    saveSession();

    if(!room.started){
      enterLobby();
      return true;
    }
    if(gameMode==='chimera'){
      attachRoomListeners();
      if(room.finished){ await enterChimeraReveal(); }
      else if(!room.topic){ await enterChimeraTopicPhase(room); }
      else { await enterChimeraTurnPhase(room); }
      return true;
    }
    if(room.finished){
      phase = 'spectator';
      await enterRevealPhase();
      return true;
    }
    playerOrder = room.playerOrder || []; totalRounds = room.totalRounds || 0;
    var p = playerOrder.indexOf(myId);
    attachRoomListeners();
    if(p===-1){
      phase = 'spectator';
      renderSpectator();
      return true;
    }
    var r = room.currentRound;
    var mySub = await dbGet(pSubmit(sess.room, r, myId));
    if(mySub){
      mySubmittedRound = r;
      phase = 'waiting';
      renderWaitingScreen();
      attachWaitingSubmitsWatch(r);
    } else {
      await enterRoundPhase(room);
    }
    return true;
  }

  // ---------- game flow ----------
  async function createRoom(name, mode, turnSec){
    myName = name; myId = genId();
    gameMode = mode || 'phone';
    chimeraTopic = '';
    chimeraTopicSetterId = null;
    if(gameMode==='chimera'){
      chimeraTurnSec = (CHIMERA_TURN_OPTIONS.indexOf(turnSec)!==-1) ? turnSec : 5;
    }
    var code = null;
    for(var i=0;i<6;i++){
      var candidate = genRoomCode();
      var exists = await dbGet(pRoom(candidate));
      if(!exists){ code = candidate; break; }
    }
    if(!code){ alert('もういちどやってみてね'); return; }
    roomCode = code; isHost = true;
    lobbyDeadline = Date.now() + LOBBY_TIMEOUT_SEC*1000;
    var room = { code: code, hostId: myId, mode: gameMode, started:false, finished:false, expired:false, currentRound:0, totalRounds:0, roundStartedAt:0, roundDurationSec:(gameMode==='chimera' ? chimeraTurnSec : ROUND_SEC), playerOrder:[], lobbyDeadline: lobbyDeadline };
    if(gameMode==='chimera'){ room.topic = ''; room.topicSetterId = ''; }
    var okRoom = await dbSet(pRoom(code), room);
    var okJoin = await dbSet(pPlayer(code, myId), { id:myId, name:myName, joinedAt: Date.now() });
    if(gameMode==='chimera'){ await dbSet(pChimeraStrokes(code), []); }
    if(!okRoom || !okJoin){
      alert('部屋をつくれませんでした。インターネットせつぞくをかくにんして、もういちどためしてね');
      renderHome();
      return;
    }
    saveSession();
    enterLobby();
  }

  async function joinRoom(code, name){
    var room = await dbGet(pRoom(code));
    if(!room){ alert('部屋が見つかりませんでした。番号をかくにんしてね'); return; }
    if(room.started){ alert('このゲームはもうはじまっています'); return; }
    gameMode = room.mode || 'phone';
    chimeraTopic = room.topic || '';
    chimeraTopicSetterId = room.topicSetterId || null;
    lobbyDeadline = room.lobbyDeadline || 0;
    myName = name; myId = genId(); roomCode = code; isHost = false;
    var ok = await dbSet(pPlayer(code, myId), { id:myId, name:myName, joinedAt: Date.now() });
    if(!ok){
      alert('部屋に入れませんでした。インターネットせつぞくをかくにんして、もういちどためしてね');
      roomCode = null;
      return;
    }
    saveSession();
    enterLobby();
  }

  function attachRoomListeners(){
    detachListeners();
    roomUnsub = dbWatch(pRoom(roomCode), handleRoomUpdate);
    playersUnsub = dbWatch(pPlayers(roomCode), handlePlayersUpdate);
  }

  function enterLobby(){
    phase = 'lobby';
    attachRoomListeners();
    renderLobby();
    if(isHost){
      if(lobbyHostCheckInterval){ clearInterval(lobbyHostCheckInterval); }
      lobbyHostCheckInterval = setInterval(checkLobbyTimeout, 2000);
    }
  }

  function handlePlayersUpdate(playersObj){
    var players = playersObj ? Object.keys(playersObj).map(function(k){ return playersObj[k]; }) : [];
    players.sort(function(a,b){ return (a.joinedAt||0) - (b.joinedAt||0); });
    lastPlayers = players;
    if(phase==='lobby'){
      updatePlayerListUI(players);
      if(isHost){
        var btn = document.getElementById('btnStart');
        var minP = (gameMode==='chimera') ? MIN_PLAYERS_CHIMERA : MIN_PLAYERS;
        if(btn) btn.disabled = players.length < minP;
      }
    }
  }

  function handleRoomUpdate(room){
    if(!room) return;
    lastRoom = room;
    gameMode = room.mode || 'phone';
    if(room.topic!=null){ chimeraTopic = room.topic; }
    if(room.lobbyDeadline){ lobbyDeadline = room.lobbyDeadline; }
    if(room.currentRound !== advancingRound){ advancingRound = -1; }
    if(phase==='lobby'){
      if(room.expired){ forceExitExpiredRoom(); return; }
      if(room.started){
        if(gameMode==='chimera'){
          if(!room.topic){ enterChimeraTopicPhase(room); } else { enterChimeraTurnPhase(room); }
        } else { enterRoundPhase(room); }
      }
      return;
    }
    if(phase==='waiting'){
      if(room.finished){ enterRevealPhase(); return; }
      if(room.currentRound > mySubmittedRound){ enterRoundPhase(room); }
      return;
    }
    if(phase==='spectator'){
      if(room.finished){ enterRevealPhase(); }
      return;
    }
    if(phase==='chimera-topic-wait' || phase==='chimera-topic-input'){
      if(room.topic){ enterChimeraTurnPhase(room); }
      return;
    }
    if(phase==='chimera-turn' || phase==='chimera-watch' || phase==='chimera-submitted' || phase==='chimera-guess'){
      if(room.finished){ enterChimeraReveal(); return; }
      if(room.currentRound !== currentRoundSeen){ enterChimeraTurnPhase(room); }
      return;
    }
  }

  async function startGame(){
    var players = lastPlayers || [];
    var minP = (gameMode==='chimera') ? MIN_PLAYERS_CHIMERA : MIN_PLAYERS;
    if(players.length < minP){ alert('さんかしゃが' + minP + '人にたりません。もうすこしまってね'); return; }
    var order = shuffle(players.map(function(p){ return p.id; }));
    var updateObj = { started:true, currentRound:0, totalRounds: order.length, roundStartedAt: Date.now(), roundDurationSec: (gameMode==='chimera' ? chimeraTurnSec : ROUND_SEC), playerOrder: order };
    if(gameMode==='chimera'){
      // さいごの人(お題をあてる人)いがいから、ランダムでお題を決める人をえらぶ
      var guesserId = order[order.length-1];
      var candidates = order.filter(function(id){ return id !== guesserId; });
      var topicSetterId = candidates[Math.floor(Math.random()*candidates.length)];
      updateObj.topicSetterId = topicSetterId;
      updateObj.topic = '';
    }
    var ok = await dbUpdate(pRoom(roomCode), updateObj);
    if(!ok){ alert('スタートできませんでした。もういちどためしてね'); }
  }

  async function enterRoundPhase(room){
    playerOrder = room.playerOrder; totalRounds = room.totalRounds;
    var r = room.currentRound;
    var p = playerOrder.indexOf(myId);
    if(p===-1){ phase='spectator'; renderSpectator(); return; }
    myBookIndex = ((p - r) % totalRounds + totalRounds) % totalRounds;
    var prevType=null, prevContent=null;
    if(r>0){
      var prevEntry = await dbGet(pEntry(roomCode, myBookIndex, r-1));
      if(prevEntry){ prevType = prevEntry.type; prevContent = prevEntry.content; }
    }
    var myType = (r % 2 === 0) ? 'write' : 'draw';
    roundDeadline = room.roundStartedAt + room.roundDurationSec*1000;
    currentRoundSeen = r;
    phase = 'round';
    renderRoundScreen(r, totalRounds, myType, prevType, prevContent);
    startCountdown();
  }

  async function submitWrite(text){
    if(phase!=='round') return;
    var t = (text||'').trim();
    if(!t) t = '(なにもかかなかったよ)';
    t = t.slice(0,40);
    await writeEntryAndSubmit({ type:'write', authorId:myId, authorName:myName, content:t });
  }

  async function submitDraw(){
    if(phase!=='round') return;
    await writeEntryAndSubmit({ type:'draw', authorId:myId, authorName:myName, content: strokes });
  }

  async function writeEntryAndSubmit(entry){
    if(phase!=='round') return;
    stopCountdown();
    phase = 'submitting';
    await dbSet(pEntry(roomCode, myBookIndex, currentRoundSeen), entry);
    await dbSet(pSubmit(roomCode, currentRoundSeen, myId), true);
    mySubmittedRound = currentRoundSeen;
    phase = 'waiting';
    renderWaitingScreen();
    attachWaitingSubmitsWatch(currentRoundSeen);
    // 自分の送信が遅れている間に、ほかの人の進行でラウンドがすでに
    // 先に進んでいた場合はすぐに追いつく(取り残されて待機画面のまま
    // 固まってしまうのを防ぐ)
    if(lastRoom && lastRoom.currentRound > mySubmittedRound){
      if(lastRoom.finished){ enterRevealPhase(); }
      else { enterRoundPhase(lastRoom); }
    }
  }

  function attachWaitingSubmitsWatch(round){
    if(waitingSubmitsUnsub){ waitingSubmitsUnsub(); waitingSubmitsUnsub=null; }
    waitingSubmitsUnsub = dbWatch(pSubmits(roomCode, round), function(submitsObj){
      var count = submitsObj ? Object.keys(submitsObj).length : 0;
      if(phase==='waiting'){
        var el = document.getElementById('submitCount');
        if(el) el.textContent = count + ' / ' + playerOrder.length + ' 人がだしたよ';
      }
      if(isHost){ maybeAdvanceRound(round, count); }
    });
    if(isHost){
      if(hostTimeUpInterval){ clearInterval(hostTimeUpInterval); }
      hostTimeUpInterval = setInterval(async function(){
        if(!isHost || !roomCode || !lastRoom || lastRoom.finished) return;
        var curRound = lastRoom.currentRound;
        var submitsObj = await dbGet(pSubmits(roomCode, curRound));
        var count = submitsObj ? Object.keys(submitsObj).length : 0;
        maybeAdvanceRound(curRound, count);
      }, 2000);
    }
  }

  async function maybeAdvanceRound(round, submittedCount){
    if(!isHost) return;
    if(!lastRoom || lastRoom.finished) return;
    if(round !== lastRoom.currentRound) return;
    if(advancingRound === round) return;
    var allSubmitted = submittedCount >= (lastRoom.playerOrder ? lastRoom.playerOrder.length : 0);
    var timeUp = Date.now() >= lastRoom.roundStartedAt + lastRoom.roundDurationSec*1000 + 2500;
    if(allSubmitted || timeUp){
      advancingRound = round;
      var nextRound = round + 1;
      if(nextRound >= lastRoom.totalRounds){
        await dbUpdate(pRoom(roomCode), { finished:true });
      } else {
        await dbUpdate(pRoom(roomCode), { currentRound: nextRound, roundStartedAt: Date.now() });
      }
    }
  }

  function startCountdown(){
    stopCountdown();
    function tick(){
      var msLeft = roundDeadline - Date.now();
      var secLeft = Math.max(0, Math.ceil(msLeft/1000));
      var el = document.getElementById('timerText');
      if(el) el.textContent = secLeft + 'びょう';
      if(secLeft<=0){ stopCountdown(); handleTimeUp(); }
    }
    tick();
    timerInterval = setInterval(tick, 500);
  }
  function stopCountdown(){
    if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  }
  // スマホがバックグラウンドになるとsetIntervalが止まることがあるため、
  // 画面がふたたび表示されたタイミングでも時間切れになっていないか確認する
  function recheckTimeoutIfDue(){
    if(!roundDeadline) return;
    if((phase==='round' || phase==='chimera-turn' || phase==='chimera-guess') && Date.now() >= roundDeadline){
      stopCountdown();
      handleTimeUp();
    }
  }
  function handleTimeUp(){
    if(phase==='round'){
      var myType = (currentRoundSeen % 2 === 0) ? 'write' : 'draw';
      if(myType==='write'){
        var val = currentInputEl ? currentInputEl.value : '';
        submitWrite(val);
      } else {
        submitDraw();
      }
      return;
    }
    if(phase==='chimera-turn'){
      submitChimeraTurn();
      return;
    }
    if(phase==='chimera-guess'){
      var guessVal = currentInputEl ? currentInputEl.value : '';
      submitChimeraGuess(guessVal);
      return;
    }
    // chimera-watch: 何もしない。手番の人からのルーム更新をまつ
  }

  // ---------- chimera mode ----------
  async function enterChimeraTopicPhase(room){
    playerOrder = room.playerOrder || []; totalRounds = room.totalRounds || 0;
    chimeraTopicSetterId = room.topicSetterId || null;
    stopCountdown();
    if(chimeraTopicSetterId === myId){
      phase = 'chimera-topic-input';
      renderChimeraTopicInputScreen();
    } else {
      phase = 'chimera-topic-wait';
      var setterPlayer = null;
      for(var i=0;i<lastPlayers.length;i++){ if(lastPlayers[i].id===chimeraTopicSetterId){ setterPlayer=lastPlayers[i]; break; } }
      renderChimeraTopicWaitScreen(setterPlayer ? setterPlayer.name : 'だれか');
    }
  }

  function renderChimeraTopicInputScreen(){
    appEl.innerHTML =
      '<div class="screen form">' +
        '<div class="logo" style="font-size:22px;">おだいをきめてね</div>' +
        '<p class="hint">ランダムであなたがえらばれたよ!このおだいは、さいごに絵を見てあてる人いがいの<br>みんなに見えるようになるよ</p>' +
        '<div class="card">' +
          '<p class="form-label">おだい</p>' +
          '<div class="choice-row" style="justify-content:flex-start; margin-bottom:10px;">' +
            '<button type="button" id="topicRandomBtn2" class="small-btn">🎲 ランダムでおまかせ</button>' +
          '</div>' +
          '<input type="text" id="topicInput2" maxlength="30" placeholder="例: うちゅうじんとおどるネコ">' +
        '</div>' +
        '<button id="topicSubmitBtn" class="big-btn crayon-orange">これでおだいをきめる!</button>' +
      '</div>';
    var input = document.getElementById('topicInput2');
    document.getElementById('topicRandomBtn2').onclick = function(){ input.value = pickFunnyExamples(1)[0]; };
    document.getElementById('topicSubmitBtn').onclick = function(){ submitChimeraTopic(input.value); };
    input.focus();
  }

  async function submitChimeraTopic(text){
    if(phase!=='chimera-topic-input') return;
    var t = (text||'').trim();
    if(!t){ t = pickFunnyExamples(1)[0]; }
    t = t.slice(0,30);
    chimeraTopic = t;
    appEl.innerHTML =
      '<div class="screen wait">' +
        '<div class="logo" style="font-size:22px;">けっていしたよ!</div>' +
        '<p class="hint">みんなにおしらせしています…</p>' +
        '<div class="spinner"></div>' +
      '</div>';
    await dbUpdate(pRoom(roomCode), { topic: t, roundStartedAt: Date.now() });
  }

  function renderChimeraTopicWaitScreen(setterName){
    appEl.innerHTML =
      '<div class="screen wait">' +
        '<div class="logo" style="font-size:22px;">おだいをきめているよ</div>' +
        '<p class="hint">' + esc(setterName) + 'さんがおだいをかんがえているよ…すこしまってね</p>' +
        '<div class="spinner"></div>' +
      '</div>';
  }

  async function enterChimeraTurnPhase(room){
    playerOrder = room.playerOrder; totalRounds = room.totalRounds;
    if(room.topic!=null){ chimeraTopic = room.topic; }
    var r = room.currentRound;
    currentRoundSeen = r;
    var activeId = playerOrder[r];
    roundDeadline = room.roundStartedAt + room.roundDurationSec*1000;

    var locked = await dbGet(pChimeraStrokes(roomCode));
    chimeraLockedStrokes = locked || [];
    strokes = [];

    var isLastTurn = (r === totalRounds - 1);
    var guesserId = playerOrder[totalRounds-1];

    if(activeId === myId){
      if(isLastTurn){
        phase = 'chimera-guess';
        renderChimeraGuessScreen(r, totalRounds);
      } else {
        phase = 'chimera-turn';
        renderChimeraTurnScreen(r, totalRounds);
      }
      startCountdown();
    } else {
      phase = 'chimera-watch';
      var activePlayer = null;
      for(var i=0;i<lastPlayers.length;i++){ if(lastPlayers[i].id===activeId){ activePlayer=lastPlayers[i]; break; } }
      var hideTopicForMe = (myId === guesserId);
      renderChimeraWatchScreen(r, totalRounds, activePlayer ? activePlayer.name : 'だれか', isLastTurn, hideTopicForMe);
      startCountdown();
    }
  }

  function renderChimeraTurnScreen(r, total){
    var topHtml = '<div class="round-bar"><span>' + (r+1) + ' / ' + total + '人め</span><span class="timer-pill" id="timerText">--びょう</span></div>';
    var bodyHtml =
      '<div class="prompt-box">おだい: 「' + esc(chimeraTopic) + '」<br>まえの人がかいた絵に、つづきをかいてね</div>' +
      '<div class="canvas-stack"><canvas id="lockedCanvas"></canvas><canvas id="drawCanvas"></canvas></div>' +
      '<div class="pentype-row" id="pentypeToolbar"></div>' +
      '<div class="toolbar" id="colorToolbar"></div>' +
      '<div class="toolbar"><div id="sizeToolbar" style="display:flex; gap:8px; flex-wrap:wrap;"></div>' +
        '<div class="tool-action"><button id="undoBtn" class="small-btn">じぶんのをもどす</button><button id="clearBtn" class="small-btn">じぶんのをけす</button></div>' +
      '</div>' +
      '<p class="hint">まえの人がかいたぶんは消せないよ。じぶんがかいたぶんだけ、消しゴム・もどす・けすがつかえるよ</p>' +
      '<button id="submitBtn" class="big-btn crayon-teal">つぎの人へ!</button>';
    appEl.innerHTML = '<div class="screen play">' + topHtml + bodyHtml + '</div>';

    currentInputEl = null;
    selectedColor = PEN_COLORS[0].hex;
    selectedSize = PEN_SIZES[DEFAULT_SIZE_INDEX].w;
    selectedPenType = PEN_TYPES[0].id;

    buildDrawToolbars(
      document.getElementById('pentypeToolbar'),
      document.getElementById('colorToolbar'),
      document.getElementById('sizeToolbar')
    );

    var lc = document.getElementById('lockedCanvas');
    var dc = document.getElementById('drawCanvas');
    prepareCanvas(lc);
    prepareCanvas(dc);
    paintStrokes(lc.getContext('2d'), lc, chimeraLockedStrokes);
    setupDrawing(dc);
    document.getElementById('undoBtn').onclick = function(){ strokes.pop(); paintStrokes(dc.getContext('2d'), dc, strokes); };
    document.getElementById('clearBtn').onclick = function(){ strokes = []; paintStrokes(dc.getContext('2d'), dc, strokes); };
    document.getElementById('submitBtn').onclick = function(){ submitChimeraTurn(); };
  }

  function renderChimeraWatchScreen(r, total, activeName, isLastTurn, hideTopic){
    var topHtml = '<div class="round-bar"><span>' + (r+1) + ' / ' + total + '人め</span><span class="timer-pill" id="timerText">--びょう</span></div>';
    var promptHtml;
    if(isLastTurn){
      promptHtml = '<div class="prompt-box">かんせいした絵を見て、' + esc(activeName) + 'さんがおだいをあてているよ!</div>';
    } else if(hideTopic){
      promptHtml = '<div class="prompt-box">まえの人がかいた絵に、つづきをかいてるよ<br>(おだいはひみつだよ!)</div>';
    } else {
      promptHtml = '<div class="prompt-box">おだい: 「' + esc(chimeraTopic) + '」<br>まえの人がかいた絵に、つづきをかいてるよ</div>';
    }
    var waitMsg = isLastTurn
      ? (esc(activeName) + 'さんがおだいをあてているよ…けっかをまってね')
      : (esc(activeName) + 'さんがかいているよ…じゅんばんをまってね');
    var bodyHtml =
      promptHtml +
      '<p class="hint" style="font-weight:700; text-align:center;">' + waitMsg + '</p>' +
      '<div class="preview-canvas"><canvas id="watchCanvas"></canvas></div>';
    appEl.innerHTML = '<div class="screen play">' + topHtml + bodyHtml + '</div>';
    var wc = document.getElementById('watchCanvas');
    prepareCanvas(wc);
    paintStrokes(wc.getContext('2d'), wc, chimeraLockedStrokes);
  }

  async function submitChimeraTurn(){
    if(phase!=='chimera-turn') return;
    stopCountdown();
    var mine = strokes.slice();
    var merged = chimeraLockedStrokes.concat(mine);
    phase = 'chimera-submitted';
    appEl.innerHTML =
      '<div class="screen wait">' +
        '<div class="logo" style="font-size:22px;">そうしんしたよ!</div>' +
        '<p class="hint">つぎの人にバトンタッチ…</p>' +
        '<div class="spinner"></div>' +
      '</div>';
    await dbSet(pChimeraStrokes(roomCode), merged);
    var nextRound = currentRoundSeen + 1;
    if(nextRound >= totalRounds){
      // ふつうは最後の一人は「お題あて」ターンになるのでここには
      // 来ないはずだが、念のための保険としてそのまま終了させる
      await dbUpdate(pRoom(roomCode), { finished:true });
    } else {
      await dbUpdate(pRoom(roomCode), { currentRound: nextRound, roundStartedAt: Date.now() });
    }
  }

  function renderChimeraGuessScreen(r, total){
    var topHtml = '<div class="round-bar"><span>さいごの人(' + (r+1) + ' / ' + total + ')</span><span class="timer-pill" id="timerText">--びょう</span></div>';
    var bodyHtml =
      '<div class="prompt-box">みんなでかいたこの絵は、なんだと思う?<br>おだいをあててね!</div>' +
      '<div class="preview-canvas"><canvas id="guessPreviewCanvas"></canvas></div>' +
      '<div class="card">' +
        '<p class="form-label">こたえ</p>' +
        '<textarea id="guessInput" rows="2" maxlength="30" placeholder="これは「○○」だとおもう!"></textarea>' +
      '</div>' +
      '<button id="submitGuessBtn" class="big-btn crayon-orange">これでこたえる!</button>';
    appEl.innerHTML = '<div class="screen play">' + topHtml + bodyHtml + '</div>';
    currentInputEl = document.getElementById('guessInput');
    var gc = document.getElementById('guessPreviewCanvas');
    prepareCanvas(gc);
    paintStrokes(gc.getContext('2d'), gc, chimeraLockedStrokes);
    document.getElementById('submitGuessBtn').onclick = function(){ submitChimeraGuess(currentInputEl.value); };
  }

  async function submitChimeraGuess(text){
    if(phase!=='chimera-guess') return;
    stopCountdown();
    var t = (text||'').trim();
    if(!t) t = '(なにもこたえられなかったよ)';
    t = t.slice(0,30);
    phase = 'chimera-submitted';
    appEl.innerHTML =
      '<div class="screen wait">' +
        '<div class="logo" style="font-size:22px;">そうしんしたよ!</div>' +
        '<p class="hint">けっかをひょうじするよ…</p>' +
        '<div class="spinner"></div>' +
      '</div>';
    await dbUpdate(pRoom(roomCode), { finished:true, chimeraGuess:t, chimeraGuessAuthor: myName });
  }

  async function enterChimeraReveal(){
    if(phase==='chimera-reveal') return;
    phase = 'chimera-reveal';
    stopCountdown();
    detachListeners();
    var room = await dbGet(pRoom(roomCode));
    var final = await dbGet(pChimeraStrokes(roomCode));
    renderChimeraReveal(final || [], room || {});
  }

  function renderChimeraReveal(finalStrokes, room){
    var guess = room && room.chimeraGuess ? room.chimeraGuess : '(こたえられなかったよ)';
    var guessAuthor = room && room.chimeraGuessAuthor ? room.chimeraGuessAuthor : '';
    appEl.innerHTML =
      '<div class="screen reveal">' +
        '<div class="logo" style="font-size:24px;">かんせい!</div>' +
        '<div class="preview-canvas"><canvas id="finalCanvas"></canvas></div>' +
        '<div class="bubble">' + (guessAuthor ? esc(guessAuthor) + 'さんのこたえ: ' : 'こたえ: ') + '「' + esc(guess) + '」</div>' +
        '<div class="prompt-box">ほんとうのおだい: 「' + esc(chimeraTopic) + '」</div>' +
        '<button id="btnHome" class="small-btn">さいしょの画面にもどる</button>' +
      '</div>';
    var fc = document.getElementById('finalCanvas');
    document.getElementById('btnHome').onclick = resetToHome;
    try{
      prepareCanvas(fc);
      paintStrokes(fc.getContext('2d'), fc, finalStrokes);
    }catch(err){ console.error('最終結果の絵の描画に失敗しました', err); }
  }

  // ---------- init ----------
  async function init(){
    document.addEventListener('visibilitychange', function(){
      if(document.visibilityState==='visible'){ recheckTimeoutIfDue(); }
    });
    window.addEventListener('focus', recheckTimeoutIfDue);
    var homeBtn = document.getElementById('globalHomeBtn');
    if(homeBtn){
      homeBtn.onclick = leaveRoom;
      setInterval(function(){
        var show = !!roomCode && phase!=='home' && phase!=='firebase-setup';
        homeBtn.style.display = show ? 'block' : 'none';
      }, 300);
    }

    var params = new URLSearchParams(location.search);
    var roomParam = params.get('room');
    var ak = params.get('ak');
    var du = params.get('du');
    pendingJoinCode = (roomParam && /^[0-9]{4}$/.test(roomParam)) ? roomParam : null;

    if(ak && du){
      try{
        var app1 = initializeApp({ apiKey: decodeURIComponent(ak), databaseURL: decodeURIComponent(du) }, 'gartic-' + Date.now());
        db = getDatabase(app1);
        onFirebaseReady();
        return;
      }catch(e){ /* fall through to manual setup */ }
    }

    var savedKey = null, savedUrl = null;
    try{ savedKey = localStorage.getItem('gartic_fb_apikey'); savedUrl = localStorage.getItem('gartic_fb_dburl'); }catch(e){}
    if(savedKey && savedUrl){
      try{
        var app2 = initializeApp({ apiKey: savedKey, databaseURL: savedUrl }, 'gartic-' + Date.now());
        db = getDatabase(app2);
        onFirebaseReady();
        return;
      }catch(e){ /* fall through */ }
    }
    renderFirebaseSetup(savedKey, savedUrl);
  }

  init();
})();
</script>
